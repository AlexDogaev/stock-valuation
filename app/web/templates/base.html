<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · Оценка акций MOEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Lora:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css?v=20260617-min7">
  <script src="/static/app.js?v=20260617-min7"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <span class="brand">📊 Оценка акций · MOEX</span>
    <nav>
      <a href="/">Скринер</a>
      <a href="/portfolio">Портфель</a>
      <a href="/calculators">Калькуляторы</a>
      <a href="/backtest">Backtest</a>
      <a href="/settings">Настройки</a>
    </nav>
    <span class="spacer"></span>
    <span class="ctl">Режим
      <select id="g-regime">
        <option value="спокойное">спокойное</option>
        <option value="ШОК">ШОК</option>
      </select>
    </span>
    <span class="ctl">Дефлятор
      <select id="g-deflator">
        <option value="тактический">тактический</option>
        <option value="стратегический">стратегический</option>
      </select>
      <span id="g-deflator-val" class="muted"></span>
    </span>
    <span class="ctl">Горизонт
      <select id="g-horizon">
        <option value="1">1 год</option>
        <option value="3">3 года</option>
        <option value="5">5 лет</option>
      </select>
    </span>
    <div class="nwf" id="nwf-marker"></div>
    <div class="nwf" id="shock-marker"></div>
  </header>
  <main>
    {% block content %}{% endblock %}
    <p class="disc">⚠ {{ disclaimer }}</p>
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
