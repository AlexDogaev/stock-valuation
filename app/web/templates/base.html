<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · Оценка акций MOEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Lora:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css?v=20260619-batch3">
  <script src="/static/app.js?v=20260620-terminfl"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <span class="brand">📊 Оценка акций · MOEX</span>
    <nav>
      <a href="/">Скринер</a>
      <a href="/bonds">Облигации</a>
      <a href="/portfolio">Портфель</a>
      <a href="/calculators">Калькуляторы</a>
      <a href="/backtest">Backtest</a>
      <a href="/settings">Настройки</a>
    </nav>
    <span class="spacer"></span>
    <span class="ctl">Режим
      <select id="g-regime">
        <option value="спокойное">спокойное</option>
        <option value="ШОК">ШОК</option>
      </select>
    </span>
    <span class="ctl">Инфляция
      <input type="number" id="g-felt" class="num" step="0.1" inputmode="decimal" title="Ощущаемая инфляция сейчас (год 1) — дефлятор реальной доходности">%<span id="g-felt-eff" class="muted" title="Эффективный дефлятор за горизонт с учётом снижения КС (геом. среднее траектории)"></span>
    </span>
    <span class="ctl">Таргет
      <input type="number" id="g-target" class="num" step="0.5" inputmode="decimal" title="Желаемая реальная доходность над ощущаемой инфляцией">%
    </span>
    <span class="ctl">КС
      <input type="number" id="g-ks" class="num" step="0.5" inputmode="decimal" title="Ключевая ставка ЦБ. Ручной override объявленной ставки, пока ЦБ SOAP не опубликовал (вступает в силу со след. раб. дня)">%
    </span>
    <span class="ctl">Терм.инфл
      <input type="number" id="g-terminal" class="num" step="0.5" inputmode="decimal" title="Терминальная инфляция (куда сойдёт в долгосроке). По умолчанию из траектории КС (КС−2.5%). Override — стресс «инфляция залипнет выше»: поднимает E[инфл] длинных бумаг → реал.YTM фикса вниз.">%
    </span>
    <span class="ctl">Горизонт
      <select id="g-horizon">
        <option value="1">1 год</option>
        <option value="3">3 года</option>
        <option value="5">5 лет</option>
        <option value="10">10 лет</option>
        <option value="20">20 лет</option>
      </select>
    </span>
    <div class="nwf" id="rate-marker"></div>
    <div class="nwf" id="nwf-marker"></div>
    <div class="nwf" id="shock-marker"></div>
  </header>
  <main>
    {% block content %}{% endblock %}
    <p class="disc">⚠ {{ disclaimer }}</p>
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
