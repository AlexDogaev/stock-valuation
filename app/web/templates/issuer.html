{% extends "base.html" %}
{% block head %}
<style>
  /* ── Карточка эмитента: первый экран. База (шрифты, панели, кнопки) — глобально в app.css ── */
  #card { max-width: 860px; margin: 0 auto; }
  #card .vname {
    font-family: var(--font-display); font-weight: 500;
    font-size: clamp(30px, 5vw, 44px); line-height: 1.04; letter-spacing: -.012em; margin: 0;
  }
  #card .vmeta {
    margin-top: 10px; font-size: 12.5px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--muted);
  }
  #card .vverdict {
    margin-top: 22px; display: flex; align-items: baseline; gap: 11px; flex-wrap: wrap; font-size: 14px;
  }
  #card .vsignal { font-weight: 600; letter-spacing: .09em; text-transform: uppercase; }
  #card .vsignal.buy { color: var(--buy); }
  #card .vsignal.edge { color: var(--edge); }
  #card .vsignal.avoid { color: var(--avoid); }
  #card .vsep { color: var(--faint); }
  #card .vquality { color: var(--muted); }
  #card .vquality.buy { color: var(--q-green); }
  #card .vquality.edge { color: var(--q-amber); }
  #card .vflag { color: var(--avoid); font-size: 12px; letter-spacing: .04em; }
  /* действие из матрицы качество×цена (§1) — синтез двух слоёв, главный вердикт */
  #card .vaction { margin-top: 10px; font-size: 19px; font-weight: 600; letter-spacing: .01em; }
  #card .vaction.buy { color: var(--buy); }
  #card .vaction.edge { color: var(--edge); }
  #card .vaction.avoid { color: var(--avoid); }
  #card .vaction .vzone { color: var(--muted); font-weight: 400; font-size: 13px; }

  #card .vmetrics {
    display: flex; flex-wrap: wrap; margin-top: 38px;
    border-top: 1px solid var(--hair); border-bottom: 1px solid var(--hair);
  }
  #card .vmetric { flex: 1 1 150px; padding: 22px 24px 22px 0; }
  #card .vm-k {
    display: block; font-size: 11.5px; letter-spacing: .15em; text-transform: uppercase; color: var(--muted);
  }
  #card .vm-v {
    display: block; margin-top: 10px; font-family: var(--mono);
    font-size: clamp(23px, 3.2vw, 30px); font-weight: 500;
    font-feature-settings: "tnum" 1; letter-spacing: -.01em;
  }

  #card .vrationale { margin-top: 34px; max-width: 64ch; }
  #card .vrationale .vm-k { margin-bottom: 12px; }
  #card .vrationale p { margin: 0; font-size: 17.5px; line-height: 1.75; color: #c7c4bd; }

  #card .vtoggle {
    margin-top: 38px; background: none; border: 0; padding: 8px 0;
    color: var(--muted); font-family: inherit; font-size: 12.5px;
    letter-spacing: .15em; text-transform: uppercase; cursor: pointer;
    border-bottom: 1px solid transparent; transition: color .15s, border-color .15s;
  }
  #card .vtoggle:hover { color: var(--ink); border-bottom-color: var(--hair); filter: none; }

  #card #details { margin-top: 30px; }

  /* оценка метрик: контейнер карточки; строки/цвета — глобально в app.css */
  #card .vmetrics-eval { margin-top: 32px; }
  #card .meval { margin-top: 12px; }

  /* макро-тилт сигнала (постоянная строка) */
  #card .macro-tilt { margin-top: 24px; }
  #card .macro-tilt p { margin: 6px 0 0; font-size: 14px; color: var(--ink); }
  #card .macro-tilt b { font-family: var(--mono); }
  #card .macro-tilt b.up { color: var(--edge); }
  #card .macro-tilt b.down { color: var(--buy); }
</style>
{% endblock %}
{% block content %}
<p class="sub"><a href="/">← Скринер</a></p>
<div id="card"><p class="muted">Загрузка…</p></div>
{% endblock %}
{% block scripts %}
<script>
const SECID = "{{ secid }}";
let DRAFT = null;  // черновик Opus (для инлайн-обоснования на первом экране)

function kv(k, v, src) {
  return `<div class="kv"><span class="k">${k}</span><span><span class="v">${v}</span>${src ? ` <span class="src">${src}</span>` : ""}</span></div>`;
}

// оценка метрик: общий расчёт (app.js metricEvalRowsHTML) + контейнер карточки
function metricEvalBlock(x) {
  const rows = metricEvalRowsHTML(x);
  if (!rows) return "";
  return `<section class="vmetrics-eval">
    <span class="vm-k">Оценка метрик</span>
    <div class="meval">${rows}</div>
    <p class="meval-note">Пороги монотонных метрик. У банков спред = ROE − стоимость капитала
      (ROIC−WACC к банкам не применим), калиброван под высокие ставки. ROE у банков частично от плеча.
      Payout — профиль (зрелость/рост), не «сила». Наведи на аббревиатуру — расшифровка.</p>
  </section>`;
}

// постоянная строка: влияние макро (ФНБ + риск ШОКа) на сигнал через поправку hurdle
function macroTiltLine(x) {
  const m = x.macro_adj;
  if (!m) return "";
  const d = m.delta_pp;
  const cls = d > 0 ? "up" : (d < 0 ? "down" : "");
  const dir = d > 0 ? "строже (макро хрупкое)" : (d < 0 ? "агрессивнее (макро здоровое)" : "нейтрально");
  const shock = m.shock_pct == null ? "н/д" : m.shock_pct + "%";
  return `<section class="macro-tilt"><span class="vm-k">Макро-тилт сигнала</span>
    <p>hurdle <b class="${cls}">${d > 0 ? "+" : ""}${d} пп</b> · ${dir}
      <span class="muted">— хрупкость ${m.fragility} (${glossarize("ФНБ")} деваль ${m.deval_score}/6,
      риск ШОКа ${shock})</span></p></section>`;
}

function render(x) {
  const i = x.inputs, s = x.structural, c = x.calc, m = x.market, f = x.forecast;
  const dims = [["Ров","moat"],["Дизрупция","disruption"],["Секул.TAM","tam"],
                ["Регуляторика","regulation"],["Демо","demo"],["Госнавес*","gosnaves"]];
  const chips = dims.map(([lbl,k]) =>
    `<span class="chip">${lbl}: <b>${s[k]>=0?"+":""}${s[k]}</b></span>`).join("");

  let mature = "";
  if (x.mature && !x.mature.error) {
    const mt = x.mature;
    mature = `<div class="panel"><h2>Зрелая оценка (P/B = (ROE−g)/(r−g))</h2><div class="grid">
      <div>${kv("Справедливый P/B", num(mt.fair_pb))}${kv("Текущий P/B", num(mt.current_pb))}
           ${kv("Справедливая капа", num(mt.fair_cap_bln,0)+" млрд")}${kv("Вердикт", mt.verdict)}</div>
      <div>${kv("Implied номинальная", pct(mt.implied_nominal))}${kv("Implied реальная", pct(mt.implied_real))}
           ${kv("Спред r−g", pct(mt.spread)+" ("+mt.confidence+")")}
           ${kv("Нужная просадка под hurdle", mt.needed_drawdown===null?"—":pctSigned(mt.needed_drawdown))}</div>
    </div></div>`;
  } else if (x.mature && x.mature.error) {
    mature = `<div class="warn">Зрелая оценка: ${x.mature.error}</div>`;
  }

  let cls = "";
  if (x.classification) {
    const k = x.classification;
    cls = `<div class="panel"><h2>Классификация (структурный профиль)</h2><div class="grid">
      <div>${kv("Детальный тип", k.detailed)}${kv("Упрощённый (SPEC)", k.simple)}${kv("Режим оценки", k.regime)}</div>
      <div>${kv("ROIC − WACC", pct(k.roic_minus_wacc))}${kv("Фаза роста N", k.phase_n+" лет")}${kv("Терм. ставка r", pct(k.terminal_r))}</div>
    </div></div>`;
  }

  const fcast = `<div class="panel"><h2>Прогноз на ${f.years} года</h2><div class="grid">
    <div>${kv("Текущая цена", f.price_now!==null?f.price_now+" ₽":"—")}
         ${kv("Прогнозная цена через "+f.years+" г", f.price_target!==null?f.price_target+" ₽":"—", "проекция тела")}
         ${kv("Апсайд цены (котировка)", pctSigned(f.price_upside), "без дивидендов")}</div>
    <div>${kv("Полная доходность за "+f.years+" г", pctSigned(f.total_return), "с дивидендами")}
         ${kv("Реальная за "+f.years+" г", pctSigned(f.real_return), "над инфляцией")}
         ${kv("Ценовой рост, %/год", pct(f.price_cagr))}</div>
    </div>
    <p class="sub">Цена котировки растёт на рост тела × сжатие мультипликатора — дивиденды в неё НЕ входят
      (они выплачиваются). Полная доходность включает дивиденды.</p></div>`;

  const warns = (x.warnings||[]).map(w => `<div class="warn">${w}</div>`).join("");

  // обоснование Opus для первого экрана (полный текст из черновика, иначе note)
  const rationale = (DRAFT && DRAFT.rationale) ? DRAFT.rationale
                   : (s.note || "Обоснование Opus ещё не сгенерировано — нажми «🤖 LLM-черновик» в индикаторах.");
  const qcls = x.quality_marker==='PROVEN_QUALITY' ? 'buy'
             : (x.quality_marker==='PROSPECTIVE_QUALITY' ? 'edge' : '');
  // действие из матрицы §1: цвет — покупка/держать/мимо
  const actCls = /докуп|покупать/.test(x.action||'') ? 'buy'
               : ((x.action==='мимо') ? 'avoid' : 'edge');
  const priceStr = m.price!==null ? m.price.toLocaleString('ru-RU') + " ₽" : "—";

  // ── ПЕРВЫЙ ЭКРАН: оценка, цена, P/E, реальная доходность, апсайд, обоснование ──
  const summary = `
    <header>
      <h1 class="vname">${x.name}</h1>
      <div class="vmeta">${x.secid} · ${x.sector||""}</div>
      <div class="vverdict">
        <span class="vsignal ${sigClass(x.signal)}">${x.signal}</span>
        <span class="vsep">/</span>
        <span class="vquality ${qcls}">${x.quality_label}</span>
        ${x.needs_review ? '<span class="vflag">⚠ пересмотр</span>' : ''}
      </div>
      ${x.action ? `<div class="vaction ${actCls}">${x.action}<span class="vzone"> · цена: ${x.price_zone_label||''}</span></div>` : ''}
    </header>
    <section class="vmetrics">
      <div class="vmetric"><span class="vm-k">Цена</span><span class="vm-v">${priceStr}</span></div>
      <div class="vmetric"><span class="vm-k">P / E</span><span class="vm-v">${m.pe!==null?m.pe:(m.loss?"убыток":"н/д")}</span></div>
      <div class="vmetric"><span class="vm-k">Реальная · год</span><span class="vm-v">${pctSigned(x.real_return)}</span></div>
      <div class="vmetric"><span class="vm-k">Апсайд · ${f.years} г</span><span class="vm-v">${pctSigned(f.price_upside)}</span></div>
    </section>
    <section class="vrationale">
      <span class="vm-k">Обоснование оценки · Opus</span>
      <p>${glossarize(rationale)}</p>
    </section>
    ${metricEvalBlock(x)}
    ${macroTiltLine(x)}
    <button class="vtoggle" id="toggle-details" type="button">Индикаторы +</button>`;

  // ── ПОД КНОПКОЙ «ИНДИКАТОРЫ»: всё остальное ──
  const details = `<div id="details" hidden>
    <div class="panel"><h2>Рыночные данные</h2><div class="grid">
      <div>${kv("Цена бумаги", m.price!==null?m.price+" ₽":"—", "MOEX "+(m.fetched_at||""))}
           ${kv("Капитализация", m.cap_bln!==null?m.cap_bln+" млрд ₽":"—", "MOEX")}
           ${kv("Чистая прибыль TTM", m.net_profit_bln!==null?m.net_profit_bln+" млрд":"—", "T-Invest")}
           ${kv("Собств. капитал", m.equity_bln!==null?m.equity_bln+" млрд":"—", "T-Invest")}</div>
      <div>${kv("P/E", m.pe!==null?m.pe:(m.loss?"убыток":"н/д"), m.pe_source||"нет прибыли в данных")}
           ${kv("P/B", m.pb!==null?m.pb:"н/д", m.pb!==null?"капа / капитал":(m.negative_equity?"отриц. капитал":"нет капитала"))}</div>
    </div></div>

    <div class="panel"><h2>Входные метрики (с источником)</h2><div class="grid">
      <div>${kv("Цена", i.price.value!==null?i.price.value+" ₽":"—", i.price.source+" "+(i.price.date||""))}
           ${kv("Капитализация", i.cap_bln.value!==null?i.cap_bln.value+" млрд":"—", i.cap_bln.source)}
           ${kv("Дивдоходность" + (i.div_yield.spike ? ' ⚠' : ''), pct(i.div_yield.value) + (i.div_yield.spike ? ` <span class="muted">(норма ≈${pct(i.div_yield.typical)})</span>` : ''), i.div_yield.source)}</div>
      <div>${kv("g базовый", pct(i.g_base.value), i.g_base.source)}
           ${kv("Сжатие мультипл.", num(i.compression.value), i.compression.source)}
           ${kv("ROE", i.roe.value!==null?pct(i.roe.value):"—", i.roe.source)}
           ${kv("Payout", i.payout.value!==null?pct(i.payout.value):"—", i.payout.source)}
           ${kv("Требуемая r", pct(i.r_required.value), i.r_required.source)}</div>
    </div></div>

    <div class="panel"><h2>Структурный слой</h2>
      <div class="score-row">${chips}</div>
      <p class="sub" style="margin-top:10px">Балл (5 осей, госнавес* — отдельно, правило «один раз»):
        <b>${s.score}</b> · зона <b>${s.zone}</b> · множитель к g <b>${num(s.multiplier,2)}</b>
        ${s.detailed?"":" <span class='muted'>(множитель из seed, баллы не детализированы)</span>"}</p>
      ${(s.warnings||[]).map(w=>`<div class="warn">${w}</div>`).join("")}
      ${s.note?`<p class="muted">${s.note}</p>`:""}
    </div>

    <div class="panel"><h2>Как посчитан сигнал (цепочка)</h2><div class="grid">
      <div>${kv("g базовый × структ.множ", pct(i.g_base.value)+" × "+num(s.multiplier,2))}
           ${kv("= g итог", pct(c.g_final))}
           ${kv("× сжатие", num(c.compression))}
           ${kv("+ дивдоходность", pct(i.div_yield.value))}</div>
      <div>${kv("= Полная номинальная", pct(c.full_nominal))}
           ${kv("÷ (1+дефлятор)", pct(c.deflator))}
           ${kv("= Реальная доходность", pctSigned(c.real))}
           ${kv("Достоверность (r−g)", c.confidence||"—")}</div>
    </div></div>

    ${fcast}
    ${cls}
    ${mature}
    ${warns}

    <div class="panel"><h2>✎ Структурные баллы (экспертная админка)</h2>
      <p class="sub">−2 угроза … +2 попутно. Демо — детерминирован (жёстко); дизрупция — гадание (скромно).
        Госнавес учитывать ОДИН раз (не дублировать, если уже в низком g).</p>
      <div class="grid" id="edit">
        ${dims.map(([lbl,k])=>`<div><label>${lbl}</label>
           <input type="number" min="-2" max="2" step="1" id="f-${k}" value="${s[k]}"></div>`).join("")}
      </div>
      <label style="margin-top:10px;display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="f-monetization" ${s.monetization_proven?'checked':''}>
        Монетизация доказана (класс B) — даёт «перспективное качество» для добора в шок</label>
      <div style="margin-top:12px">
        <button class="ghost" id="llm-draft" title="Opus предложит баллы — проверь и сохрани">🤖 LLM-черновик</button>
        <button id="save">Сохранить и пересчитать</button>
        <span id="saved" class="muted" style="margin-left:10px"></span></div>
      <div id="llm-rationale" class="sub" style="margin-top:8px"></div>
    </div>
  </div>`;

  document.getElementById("card").innerHTML = summary + details;

  const toggle = document.getElementById("toggle-details");
  toggle.addEventListener("click", () => {
    const d = document.getElementById("details");
    const hidden = d.hasAttribute("hidden");
    if (hidden) d.removeAttribute("hidden"); else d.setAttribute("hidden", "");
    toggle.textContent = hidden ? "Индикаторы −" : "Индикаторы +";
  });

  document.getElementById("save").addEventListener("click", async () => {
    const body = {};
    dims.forEach(([_,k]) => body[k] = parseInt(document.getElementById("f-"+k).value)||0);
    body.monetization_proven = document.getElementById("f-monetization").checked ? 1 : 0;
    const res = await sendJSON(`/issuers/${SECID}/structural`, "PUT", body);
    render(res);
    document.getElementById("details").removeAttribute("hidden");
    document.getElementById("toggle-details").textContent = "Индикаторы −";
    document.getElementById("saved").textContent = "Сохранено ✓";
  });

  document.getElementById("llm-draft").addEventListener("click", async (e) => {
    const rat = document.getElementById("llm-rationale");
    e.target.textContent = "Генерирую (Opus)…"; e.target.disabled = true;
    try {
      const r = await sendJSON(`/issuers/${SECID}/llm_draft`, "POST", {});
      if (r.error) { rat.innerHTML = `<span class="warn">⚠ ${r.error}</span>`; return; }
      DRAFT = r.draft;
      dims.forEach(([_, k]) => {
        const el = document.getElementById("f-" + k);
        if (el && k in r.draft) el.value = r.draft[k];
      });
      document.getElementById("f-monetization").checked = r.draft.monetization_proven === 1;
      rat.innerHTML = `🤖 <b>Черновик Opus:</b> ${r.draft.rationale}
        <i>— проверь баллы и нажми «Сохранить», если согласен (LLM не применяет сам).</i>`;
    } catch (err) { rat.innerHTML = `<span class="warn">Ошибка: ${err.message}</span>`; }
    finally { e.target.textContent = "🤖 LLM-черновик"; e.target.disabled = false; }
  });
}

// загрузка: эмитент + черновик Opus (для инлайн-обоснования) параллельно
Promise.all([
  getJSON("/issuers/" + SECID),
  getJSON("/issuers/" + SECID + "/llm_draft").catch(() => null),
]).then(([x, draft]) => {
  DRAFT = (draft && draft.rationale) ? draft : null;
  render(x);
}).catch(e =>
  document.getElementById("card").innerHTML = `<div class="warn">Ошибка: ${e.message}</div>`);
</script>
{% endblock %}
